<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Key Check</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 100px auto; text-align: center; }
    input { padding: 10px; width: 80%; font-size: 1em; }
    button { padding: 10px 20px; margin-top: 10px; font-size: 1em; cursor: pointer; }
    #msg { margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>🔐 Enter Your Key</h2>
  <input type="text" id="keyInput" placeholder="Enter key..." />
  <br>
  <button onclick="checkKey()">Submit</button>
  <div id="msg"></div>

  <script>
    // ⚠️ For a public checker, use a read-only token or GitHub raw URL trick (see note below)
    const REPO = "yourname/my-keysystem"; // <-- change this
    const TOKEN = ""; // Optional: leave blank and use raw URL approach instead

    async function checkKey() {
      const key = document.getElementById("keyInput").value.trim();
      const msg = document.getElementById("msg");
      msg.textContent = "Checking...";

      try {
        // Use raw GitHub content (works for public repos without a token)
        const url = `https://raw.githubusercontent.com/${REPO}/main/keys.json?t=${Date.now()}`;
        const res = await fetch(url);
        const keys = await res.json();

        if (!keys[key]) {
          msg.style.color = "red";
          msg.textContent = "❌ Invalid key.";
          return;
        }

        const { expiresAt } = keys[key];
        if (expiresAt && new Date(expiresAt) < new Date()) {
          msg.style.color = "orange";
          msg.textContent = "⏰ Key expired.";
          return;
        }

        // Key is valid — redirect or show success
        document.body.innerHTML = `
          <div style="margin-top:150px; text-align:center; font-family:sans-serif">
            <h1 style="color:green">✅ Key Works!</h1>
            <p>Welcome! You have been granted access.</p>
          </div>`;
      } catch (e) {
        msg.style.color = "red";
        msg.textContent = "Error checking key: " + e.message;
      }
    }
  </script>
</body>
</html>
