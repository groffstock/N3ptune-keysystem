<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Key Generator</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    input, button { padding: 8px 12px; margin: 6px 0; width: 100%; box-sizing: border-box; }
    button { cursor: pointer; background: #2ea44f; color: white; border: none; border-radius: 4px; }
    button.danger { background: #cf222e; }
    #log { margin-top: 20px; font-size: 0.9em; color: #555; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>🔑 Key Generator</h2>

  <label>GitHub Token:</label>
  <input type="password" id="token" placeholder="ghp_..." />

  <label>Repo (user/repo):</label>
  <input type="text" id="repo" placeholder="yourname/my-keysystem" />

  <hr>
  <h3>Generate Key</h3>
  <label>Custom Key (or leave blank for random):</label>
  <input type="text" id="customKey" placeholder="e.g. BETA-TESTER-001" />

  <label>Expires in (hours, 0 = never):</label>
  <input type="number" id="expiry" value="24" min="0" />

  <button onclick="generateKey()">Generate & Save Key</button>

  <hr>
  <h3>🚫 Blocklist / Remove Key</h3>
  <label>Key to remove:</label>
  <input type="text" id="blockKey" placeholder="Enter key to delete" />
  <button class="danger" onclick="removeKey()">Remove Key</button>

  <div id="log"></div>

  <script>
    const FILE_PATH = "keys.json";

    function log(msg) {
      document.getElementById("log").textContent += msg + "\n";
    }

    function getConfig() {
      return {
        token: document.getElementById("token").value.trim(),
        repo: document.getElementById("repo").value.trim(),
      };
    }

    async function fetchKeys(token, repo) {
      const res = await fetch(`https://api.github.com/repos/${repo}/contents/${FILE_PATH}`, {
        headers: { Authorization: `token ${token}`, Accept: "application/vnd.github.v3+json" }
      });
      const data = await res.json();
      const content = JSON.parse(atob(data.content));
      return { content, sha: data.sha };
    }

    async function saveKeys(token, repo, content, sha) {
      const body = JSON.stringify({
        message: "Update keys",
        content: btoa(JSON.stringify(content, null, 2)),
        sha
      });
      await fetch(`https://api.github.com/repos/${repo}/contents/${FILE_PATH}`, {
        method: "PUT",
        headers: { Authorization: `token ${token}`, "Content-Type": "application/json" },
        body
      });
    }

    function randomKey() {
      return "KEY-" + Math.random().toString(36).substring(2, 10).toUpperCase();
    }

    async function generateKey() {
      const { token, repo } = getConfig();
      const customKey = document.getElementById("customKey").value.trim();
      const hours = parseFloat(document.getElementById("expiry").value);
      const key = customKey || randomKey();
      const expiresAt = hours > 0 ? new Date(Date.now() + hours * 3600000).toISOString() : null;

      try {
        const { content, sha } = await fetchKeys(token, repo);
        if (content[key]) { log(`⚠️ Key "${key}" already exists.`); return; }
        content[key] = { createdAt: new Date().toISOString(), expiresAt };
        await saveKeys(token, repo, content, sha);
        log(`✅ Key generated: ${key}\n   Expires: ${expiresAt || "Never"}`);
      } catch (e) {
        log("❌ Error: " + e.message);
      }
    }

    async function removeKey() {
      const { token, repo } = getConfig();
      const key = document.getElementById("blockKey").value.trim();
      if (!key) { log("⚠️ Enter a key to remove."); return; }

      try {
        const { content, sha } = await fetchKeys(token, repo);
        if (!content[key]) { log(`⚠️ Key "${key}" not found.`); return; }
        delete content[key];
        await saveKeys(token, repo, content, sha);
        log(`🗑️ Key removed: ${key}`);
      } catch (e) {
        log("❌ Error: " + e.message);
      }
    }
  </script>
</body>
</html>
